[package]
name = "web"
version = "0.1.0"
edition = "2024"

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
ui = { workspace = true }
server = { workspace = true, optional = true }

[features]
default = []
web = ["dioxus/web"]
server = ["dioxus/server", "ui/server", "dep:server"]
