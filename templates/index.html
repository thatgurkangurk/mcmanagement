<!DOCTYPE html>
<html>
<head>
    <title>mcmanagement</title>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; padding: 40px; text-align: center; }
        .server-list { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .server-btn { background: #444; color: #0f0; text-decoration: none; padding: 15px; border-radius: 8px; border: 1px solid #555; transition: 0.2s; font-weight: bold; }
        .server-btn:hover { background: #555; border-color: #0f0; }
    </style>
</head>
<body>
    <h1>select server</h1>
    <div class="server-list">
        {% for server in servers %}
            <a href="/server/{{ server.id }}" class="server-btn">{{ server.name }}</a>
        {% endfor %}
    </div>
</body>
</html>
